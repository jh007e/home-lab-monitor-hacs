# Home Lab Monitor Lovelace Dashboard Configuration
# Save as lovelace/home_lab_monitor.yaml or import directly via UI
# This creates a dashboard showing your home lab status

# Add this to your configuration.yaml under frontend:
#   lovelace:
#     mode: yaml
#     dashboards:
#       home_lab_monitor:
#           mode: yaml
#           title: Home Lab Monitor
#           sidebar: true
#           icon: mdi:server
#           type: local
#           filename: lovelace/home_lab_monitor.yaml

# Dashboard YAML - Import via UI or add to lovelace/dashboards:
home_lab_monitor_dashboard:
  title: Home Lab Monitor
  icon: mdi:server
  path: home-lab-monitor
  type: custom:html-template
  cards:
    - type: entities
      title: Overall Status
      show_header_toggle: false
      entities:
        - entity: sensor.home_lab_overall
          name: Lab Health
        - entity: binary_sensor.home_lab_monitor_overall
          name: Online
    - type: horizontal-stack
      cards:
        - type: entity
          entity: sensor.home_lab_overall
          name: Overall
          card_name: gauge
        - type: entity
          entity: sensor.home_lab_monitor_overall
          name: Status
    - type: entities
      title: Host Status Grid
      show_header_toggle: false
      entities:
        - entity: binary_sensor.synology_status
          name: Synology
        - entity: binary_sensor.truenas_status
          name: TrueNAS
        - entity: binary_sensor.ampd_ai_status
          name: AMD-AI
        - entity: binary_sensor.homeassistant_status
          name: Home Assistant
        - entity: binary_sensor.digiedge_pi_status
          name: DigiEdge Pi
        - entity: binary_sensor.hp_g3_status
          name: HP-G3
        - entity: binary_sensor.desktop_golfsim_status
          name: GolfSim
        - entity: binary_sensor.diginode_status
          name: DigiNode