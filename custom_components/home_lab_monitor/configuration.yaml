# Home Assistant Configuration for Home Lab Monitor Integration
# Place this in your config/configuration.yaml file
#
# OR: Install via UI -> Settings -> Devices & Services -> Add Integration
#      Search for "Home Lab Monitor"

# ── Integration Setup ────────────────────────────────────────────────────────
#
# The integration is installed via UI. After installation, configure:
#   - Scan interval (default: 60 seconds)
#   - Hosts to monitor
#   - Ports per host
#
# ── Manual Configuration (alternative) ───────────────────────────────────────
# If you prefer manual config, add this to configuration.yaml:

home_lab_monitor:
  interval: 60        # Scan interval in seconds
  timeout: 3          # Timeout per host in seconds
  hosts:
    - name: "Synology"
      ip: "192.168.12.35"
      group: "nas"
      description: "Synology NAS"
      ports:
        - 80
        - 443
        - 22
        - 5000
        - 5001
      labels:
        "80": "DSM"
        "443": "DSM-SSL"
        "22": "SSH"
        "5000": "Docker-HTTP"
        "5001": "Docker-SSL"
      http_ports:
        - 80
        - 443

    - name: "TrueNAS"
      ip: "192.168.12.187"
      group: "nas"
      description: "TrueNAS Server"
      ports:
        - 22
        - 80
        - 443
        - 445
        - 2049
      labels:
        "22": "SSH"
        "80": "HTTP"
        "443": "HTTPS"
        "445": "SMB"
        "2049": "NFS"
      http_ports:
        - 80
        - 443

    - name: "AMD-AI"
      ip: "192.168.12.213"
      group: "servers"
      description: "AMD AI Workstation with Ollama"
      ports:
        - 22
        - 11434
        - 1234
        - 3000
      labels:
        "22": "SSH"
        "11434": "Ollama"
        "1234": "llama-server"
        "3000": "WebUI"
      http_ports:
        - 11434
        - 1234
        - 3000

    - name: "HomeAssistant"
      ip: "192.168.12.227"
      group: "servers"
      description: "Home Assistant Core"
      ports:
        - 22
        - 1883
        - 8123
      labels:
        "22": "SSH"
        "1883": "MQTT"
        "8123": "HA-Core"
      http_ports:
        - 8123

    - name: "DigiEdge-Pi"
      ip: "192.168.12.229"
      group: "edge"
      description: "DigiEdge on Raspberry Pi"
      ports:
        - 22
      labels:
        "22": "SSH"
      http_ports: []

    - name: "HP-G3"
      ip: "192.168.12.195"
      group: "workstations"
      description: "Hermes HP G3"
      ports:
        - 22
      labels:
        "22": "SSH"
      http_ports: []

    - name: "DESKTOP-GolfSim"
      ip: "192.168.12.190"
      group: "workstations"
      description: "GolfSim Windows PC"
      ports:
        - 22
        - 3389
      labels:
        "22": "SSH"
        "3389": "RDP"
      http_ports: []

    - name: "DigiNode"
      ip: "192.168.12.204"
      group: "servers"
      description: "Dell DigiNode"
      ports:
        - 22
      labels:
        "22": "SSH"
      http_ports: []
