# Home Lab Monitor Automations
# Add this to your Home Assistant automations.yaml or via UI

# Trigger scan every 2 minutes
- id: home_lab_monitor_periodic_scan
  alias: Home Lab Monitor - Periodic Scan
  description: Trigger a scan of all hosts every 2 minutes
  trigger:
    - platform: time_pattern
      minutes: '/2'
  condition: []
  action:
    - service: home_lab_monitor.scan_now
      data: {}
  mode: restart

# Alert on host down
- id: home_lab_monitor_host_down_alert
  alias: Home Lab Monitor - Host Down Alert
  description: Send alert when a host goes down
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.synology_status
        - binary_sensor.truenas_status
        - binary_sensor.ampd_ai_status
        - binary_sensor.homeassistant_status
        - binary_sensor.digiedge_pi_status
        - binary_sensor.hp_g3_status
        - binary_sensor.desktop_golfsim_status
        - binary_sensor.diginode_status
      to: 'off'
  condition:
    - condition: template
      value_template: "{{ trigger.from_state.state == 'on' }}"
  action:
    - service: notify.telegram
      data:
        message: "🚨 Home Lab Alert: {{ trigger.to_state.name }} is DOWN!"
        title: "Home Lab Monitor - Host Down"
  mode: restart

# Alert on host recovery
- id: home_lab_monitor_host_recovery
  alias: Home Lab Monitor - Host Recovery
  description: Send notification when a host recovers
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.synology_status
        - binary_sensor.truenas_status
        - binary_sensor.ampd_ai_status
        - binary_sensor.homeassistant_status
        - binary_sensor.digiedge_pi_status
        - binary_sensor.hp_g3_status
        - binary_sensor.desktop_golfsim_status
        - binary_sensor.diginode_status
      to: 'on'
  condition:
    - condition: template
      value_template: "{{ trigger.from_state.state == 'off' }}"
  action:
    - service: notify.telegram
      data:
        message: "✅ Home Lab Recovery: {{ trigger.to_state.name }} is back online!"
        title: "Home Lab Monitor - Host Recovered"
  mode: restart

# Alert on degraded status
- id: home_lab_monitor_degraded_alert
  alias: Home Lab Monitor - Degraded Status
  description: Send warning when a host is degraded
  trigger:
    - platform: state
      entity_id:
        - sensor.home_lab_overall
      to: 'degraded'
  condition:
    - condition: template
      value_template: "{{ trigger.from_state.state not in ['degraded', 'down'] }}"
  action:
    - service: notify.telegram
      data:
        message: "⚠️ Home Lab Warning: Overall status is DEGRADED. Check host details for more information."
        title: "Home Lab Monitor - Degraded Status"
  mode: restart